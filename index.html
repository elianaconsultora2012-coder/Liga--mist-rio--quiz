<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Liga Mistério</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121214;
            color: #e1e1e6;
            display: flex;
            justify-content: center;
            align-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        #quiz {
            background-color: #202024;
            border-radius: 8px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        h2 {
            margin-top: 0;
            color: #8257e5;
            font-size: 24px;
        }
        #numero-pergunta {
            font-size: 14px;
            color: #7c7c8a;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #texto-pergunta {
            font-size: 18px;
            margin-bottom: 25px;
            line-height: 1.4;
        }
        #opcoes-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn-opcao {
            background-color: #29292e;
            border: 2px solid #323238;
            border-radius: 6px;
            color: #e1e1e6;
            padding: 14px 20px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            text-align: left;
            width: 100%;
        }
        .btn-opcao:hover {
            background-color: #8257e5;
            border-color: #8257e5;
            color: #fff;
        }
        .resultado {
            font-size: 20px;
            margin: 10px 0;
            font-weight: bold;
        }
        .btn-reiniciar {
            background-color: #8257e5;
            border: none;
            border-radius: 6px;
            padding: 14px 20px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 25px;
            font-weight: bold;
            width: 100%;
            color: white;
        }
        .btn-reiniciar:hover {
            background-color: #9466ff;
        }
    </style>
</head>
<body>

<div id="quiz">
    <div id="numero-pergunta">Carregando...</div>
    <div id="texto-pergunta">Aguarde um momento.</div>
    <div id="opcoes-container"></div>
</div>

<script>
    // Lista atualizada com exatamente 10 perguntas!
    const perguntas = [
        {
            q: "Qual integrante teve a famosa festa com touro mecânico e pinhata do Mamaco?",
            o: ["Scoob", "Jumbra", "Ziggy", "Sandega"],
            r: 2
        },
        {
            q: "Exemplo: Se o criador fizesse uma pergunta sobre o próprio passado, qual seria o formato de um vídeo antigo?",
            o: ["Vlog de webcam em 2015 com áudio estourado", "Desafio 3h da manhã em 4K", "Short gravado com IA ontem", "React cinematográfico"],
            r: 0
        },
        {
            q: "Quem é o líder supremo da Tropa do Pato?",
            o: ["Xinglau", "O Pato Rei", "Clone do Mal", "Mamaco"],
            r: 1
        },
        {
            q: "O que acontece na Mansão exatamente às 3h da manhã?",
            o: ["Todo mundo vai dormir", "O Clone do Mal aparece", "Festa do Touro Mecânico", "Gravação de Short com IA"],
            r: 1
        },
        {
            q: "Qual desses objetos é considerado uma relíquia amaldiçoada na Liga Mistério?",
            o: ["A Pinhata de Mamaco", "O Controle da Webcam", "O Touro Mecânico Quebrado", "O Computador de 2015"],
            r: 0
        },
        {
            q: "Se você encontrar o Clone do Mal no corredor, o que deve fazer?",
            o: ["Pedir um autógrafo", "Correr para o quarto do Xinglau", "Se disfarçar de Pato", "Chamar o Scoob"],
            r: 2
        },
        {
            q: "Quem sumiu misteriosamente durante o último grande enigma da Mansão?",
            o: ["Sandega", "Ziggy", "Jumbra", "Xinglau"],
            r: 0
        },
        {
            q: "Qual é o prato de comida favorito dos membros oficiais da Liga?",
            o: ["Pizza de ontem frita", "Pimenta com áudio estourado", "Biscoito do Mamaco", "Ração de Pato"],
            r: 2
        },
        {
            q: "Qual integrante é conhecido por resolver os enigmas mais difíceis usando apenas um boné virado?",
            o: ["Ziggy", "Scoob", "Jumbra", "Xinglau"],
            r: 1
        },
        {
            q: "Para vencer o jogo final da Liga Mistério, você precisa de quantos acertos?",
            o: ["Apenas 1 acerto sortudo", "Nenhum, o Clone sempre vence", "Pelo menos 9 acertos insanos", "5 acertos mais ou menos"],
            r: 2
        }
    ];

    let perguntaAtual = 0;
    let pontos = 0;

    function carregarPergunta() {
        if (perguntaAtual >= perguntas.length) {
            mostrarPlacar();
            return;
        }

        const dados = perguntas[perguntaAtual];
        document.getElementById("numero-pergunta").innerText = `Pergunta ${perguntaAtual + 1} de ${perguntas.length}`;
        document.getElementById("texto-pergunta").innerText = dados.q;
        
        const container = document.getElementById("opcoes-container");
        container.innerHTML = ""; 

        dados.o.forEach((opcao, index) => {
            const botao = document.createElement("button");
            botao.className = "btn-opcao";
            botao.innerText = opcao;
            botao.onclick = () => verificarResposta(index);
            container.appendChild(botao);
        });
    }

    function verificarResposta(indiceEscolhido) {
        if (indiceEscolhido === perguntas[perguntaAtual].r) {
            pontos++;
        }
        perguntaAtual++;
        carregarPergunta();
    }

    function mostrarPlacar() {
        const totalPerguntas = perguntas.length;
        const porcentagem = Math.round((pontos / totalPerguntas) * 100);
        const quizDiv = document.getElementById("quiz");
        
        let mensagemPersonalizada = "";
        if (porcentagem >= 90) {
            mensagemPersonalizada = "Você é INSANO! Conhece a Liga Mistério melhor que o próprio Xinglau!";
        } else if (porcentagem >= 50) {
            mensagemPersonalizada = "Muito bom! Você faz parte da Tropa do Pato, mas errou alguns detalhes.";
        } else {
            mensagemPersonalizada = "Ih, o Clone do Mal te pegou! Assista mais vídeos da Mansão às 3h da manhã e tente de novo!";
        }

        quizDiv.innerHTML = `
            <h2>Fim de Jogo!</h2>
            <p class="resultado">Você acertou ${pontos} de ${totalPerguntas}.</p>
            <p class="resultado">Aproveitamento: ${porcentagem}%</p>
            <p style="margin-top:20px; font-size:16px; line-height:1.5; color:#a8a8b3;">${mensagemPersonalizada}</p>
            <button class="btn-reiniciar" onclick="window.location.reload()">Jogar Novamente</button>
        `;
    }

    carregarPergunta();
</script>

</body>
</html>
